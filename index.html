<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Leads Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        .table-container {
            margin: 2rem auto;
            max-width: 1400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 1.5rem;
        }
        .nav-tabs .nav-link {
            font-weight: 600;
            color: #495057;
            border: none;
            padding: 0.75rem 1.25rem;
            position: relative;
        }
        .nav-tabs .nav-link.active {
            color: white;
            background: none;
            border: none;
        }
        .nav-tabs .nav-link .badge {
            font-size: 0.7rem;
            margin-left: 0.4rem;
            vertical-align: middle;
        }
        .county-tab-davidson.active { background-color: #0d6efd !important; }
        .county-tab-williamson.active { background-color: #6f42c1 !important; }
        .county-tab-wilson.active { background-color: #198754 !important; }
        .county-tab-sumner.active { background-color: #fd7e14 !important; }
        .county-tab-rutherford.active { background-color: #dc3545 !important; }
        .county-tab-robertson.active { background-color: #20c997 !important; }
        .county-tab-cheatham.active { background-color: #6610f2 !important; }
        .county-tab-all.active { background-color: #343a40 !important; }
        .nav-tabs .nav-link:not(.active):hover {
            background-color: #e9ecef;
            border: none;
        }
        .nav-tabs {
            border-bottom: 2px solid #dee2e6;
            gap: 0.25rem;
        }
        .table th {
            background-color: #343a40;
            color: white;
            border: none;
            cursor: pointer;
            user-select: none;
        }
        .table tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .table tbody tr:hover {
            background-color: #e3f2fd;
        }
        .table th.sort-asc::after {
            content: ' \u25B2';
            font-size: 12px;
        }
        .table th.sort-desc::after {
            content: ' \u25BC';
            font-size: 12px;
        }
        .table th.sortable::after {
            content: ' \u21C5';
            font-size: 12px;
            opacity: 0.5;
        }
        .table td {
            vertical-align: middle;
        }
        .sold-badge {
            background-color: #dc3545;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            background: #f1f3f5;
            border-radius: 8px;
        }
        .stat-item {
            font-size: 0.85rem;
            color: #495057;
        }
        .stat-item strong {
            color: #212529;
        }
        .empty-tab {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }
        .empty-tab h5 { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Fresh Cash Leads</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="header">
        <h1>Fresh Cash Leads Dashboard</h1>
        <p>Nashville Metro Area - 7 Counties</p>
    </div>

    <div class="container table-container">
        <!-- County Tabs -->
        <ul class="nav nav-tabs mb-3" id="countyTabs" role="tablist">
            <!-- Tabs are generated dynamically -->
        </ul>

        <!-- Toolbar -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="stats-bar flex-grow-1" id="statsBar"></div>
            <div class="d-flex gap-2 ms-3">
                <select id="priceFilter" class="form-select form-select-sm" style="width: 150px;">
                    <option value="">All Prices</option>
                    <option value="0-100000">$0 - $100K</option>
                    <option value="100000-500000">$100K - $500K</option>
                    <option value="500000-1000000">$500K - $1M</option>
                    <option value="1000000+">$1M+</option>
                </select>
                <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search leads..." style="width: 180px;">
                <button id="exportBtn" class="btn btn-success btn-sm">Export CSV</button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th data-column="0" class="sortable">Owner Name</th>
                        <th data-column="1" class="sortable">Address</th>
                        <th data-column="2" data-type="price" class="sortable">Price</th>
                        <th data-column="3" data-type="date" class="sortable">Sold Date</th>
                        <th data-column="4">Agent Phone</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="mt-2 text-muted">
            <small>Showing <span id="recordCount">0</span> records</small>
        </div>
    </div>

    <script>
        const COUNTIES = ['Davidson', 'Williamson', 'Wilson', 'Sumner', 'Rutherford', 'Robertson', 'Cheatham'];
        const COUNTY_COLORS = {
            Davidson: '#0d6efd', Williamson: '#6f42c1', Wilson: '#198754',
            Sumner: '#fd7e14', Rutherford: '#dc3545', Robertson: '#20c997', Cheatham: '#6610f2'
        };

        let allData = [];          // every row from CSV
        let countyData = {};       // { countyName: [rows] }
        let activeCounty = 'all';  // current tab
        let filteredData = [];     // what's shown in table
        let currentSortColumn = -1;
        let currentSortDirection = 'asc';

        // ---- Load CSV ----
        fetch('nashville_cash_leads_clean.csv')
            .then(r => r.text())
            .then(csv => {
                const rows = csv.split('\n').slice(1);
                allData = rows.filter(r => r.trim()).map(r => {
                    const cols = parseCSVRow(r);
                    return {
                        ownerName: cols[0] || '',
                        county: cols[1] || '',
                        address: cols[2] || '',
                        price: cols[3] || '',
                        soldDate: cols[4] || '',
                        agentPhone: cols[5] || ''
                    };
                });

                // Group by county
                countyData = {};
                COUNTIES.forEach(c => countyData[c] = []);
                allData.forEach(row => {
                    if (countyData[row.county]) {
                        countyData[row.county].push(row);
                    }
                });

                buildTabs();
                switchTab('all');
                attachListeners();
            })
            .catch(err => console.error('Error loading CSV:', err));

        // ---- Build county tabs ----
        function buildTabs() {
            const tabContainer = document.getElementById('countyTabs');
            let html = '';

            // "All" tab
            const totalCount = allData.length;
            html += `<li class="nav-item" role="presentation">
                <button class="nav-link county-tab-all active" data-county="all" type="button" role="tab">
                    All <span class="badge bg-secondary">${totalCount}</span>
                </button>
            </li>`;

            // Per-county tabs (only show counties that have data)
            COUNTIES.forEach(county => {
                const count = countyData[county].length;
                if (count === 0) return;
                const tabClass = 'county-tab-' + county.toLowerCase();
                html += `<li class="nav-item" role="presentation">
                    <button class="nav-link ${tabClass}" data-county="${county}" type="button" role="tab">
                        ${county} <span class="badge bg-secondary">${count}</span>
                    </button>
                </li>`;
            });

            tabContainer.innerHTML = html;

            // Tab click handlers
            tabContainer.querySelectorAll('.nav-link').forEach(tab => {
                tab.addEventListener('click', () => {
                    tabContainer.querySelectorAll('.nav-link').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    switchTab(tab.dataset.county);
                });
            });
        }

        // ---- Switch active tab ----
        function switchTab(county) {
            activeCounty = county;
            currentSortColumn = -1;
            currentSortDirection = 'asc';
            document.querySelectorAll('th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
            document.getElementById('searchInput').value = '';
            document.getElementById('priceFilter').value = '';
            applyFilters();
            updateStats();
        }

        // ---- Stats bar ----
        function updateStats() {
            const data = activeCounty === 'all' ? allData : countyData[activeCounty] || [];
            const bar = document.getElementById('statsBar');
            if (data.length === 0) {
                bar.innerHTML = '<span class="stat-item">No data available</span>';
                return;
            }

            const prices = data.map(r => parsePrice(r.price)).filter(p => p > 0);
            const avgPrice = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : 0;
            const minPrice = prices.length ? Math.min(...prices) : 0;
            const maxPrice = prices.length ? Math.max(...prices) : 0;

            // Date range
            const dates = data.map(r => new Date(r.soldDate)).filter(d => !isNaN(d));
            let dateRange = '';
            if (dates.length) {
                const earliest = new Date(Math.min(...dates));
                const latest = new Date(Math.max(...dates));
                dateRange = `${earliest.toLocaleDateString()} - ${latest.toLocaleDateString()}`;
            }

            bar.innerHTML = `
                <span class="stat-item"><strong>${data.length}</strong> total leads</span>
                <span class="stat-item">Avg: <strong>$${Math.round(avgPrice).toLocaleString()}</strong></span>
                <span class="stat-item">Range: <strong>$${Math.round(minPrice).toLocaleString()}</strong> - <strong>$${Math.round(maxPrice).toLocaleString()}</strong></span>
                ${dateRange ? `<span class="stat-item">Dates: <strong>${dateRange}</strong></span>` : ''}
            `;
        }

        // ---- Filtering ----
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const priceRange = document.getElementById('priceFilter').value;

            const sourceData = activeCounty === 'all' ? allData : countyData[activeCounty] || [];

            filteredData = sourceData.filter(row => {
                // Search
                const matchesSearch = searchTerm === '' ||
                    row.ownerName.toLowerCase().includes(searchTerm) ||
                    row.address.toLowerCase().includes(searchTerm) ||
                    row.price.toLowerCase().includes(searchTerm) ||
                    row.soldDate.toLowerCase().includes(searchTerm);

                // Price
                let matchesPrice = true;
                if (priceRange) {
                    const pv = parsePrice(row.price);
                    switch (priceRange) {
                        case '0-100000': matchesPrice = pv >= 0 && pv <= 100000; break;
                        case '100000-500000': matchesPrice = pv > 100000 && pv <= 500000; break;
                        case '500000-1000000': matchesPrice = pv > 500000 && pv <= 1000000; break;
                        case '1000000+': matchesPrice = pv > 1000000; break;
                    }
                }

                return matchesSearch && matchesPrice;
            });

            if (currentSortColumn >= 0) {
                const header = document.querySelector(`th[data-column="${currentSortColumn}"]`);
                sortData(currentSortColumn, header ? header.dataset.type || 'text' : 'text');
            }
            renderTable();
        }

        function attachListeners() {
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('priceFilter').addEventListener('change', applyFilters);
            document.getElementById('exportBtn').addEventListener('click', exportToCSV);

            document.querySelectorAll('th.sortable').forEach(header => {
                header.addEventListener('click', () => {
                    const col = parseInt(header.dataset.column);
                    const type = header.dataset.type || 'text';

                    if (currentSortColumn === col) {
                        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSortColumn = col;
                        currentSortDirection = 'asc';
                    }

                    document.querySelectorAll('th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                    header.classList.add(currentSortDirection === 'asc' ? 'sort-asc' : 'sort-desc');

                    sortData(col, type);
                    renderTable();
                });
            });
        }

        // ---- Sorting ----
        function sortData(column, type) {
            filteredData.sort((a, b) => {
                let va, vb;
                switch (column) {
                    case 0: va = a.ownerName.toLowerCase(); vb = b.ownerName.toLowerCase(); break;
                    case 1: va = a.address.toLowerCase(); vb = b.address.toLowerCase(); break;
                    case 2: va = parsePrice(a.price); vb = parsePrice(b.price); break;
                    case 3: va = parseDate(a.soldDate); vb = parseDate(b.soldDate); break;
                    default: return 0;
                }
                if (va < vb) return currentSortDirection === 'asc' ? -1 : 1;
                if (va > vb) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // ---- Render ----
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const countEl = document.getElementById('recordCount');

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty-tab">
                    <h5>No leads found</h5>
                    <p>Try adjusting your filters or run the pipeline from the Admin panel.</p>
                </td></tr>`;
                countEl.textContent = '0';
                return;
            }

            countEl.textContent = filteredData.length;
            const fragment = document.createDocumentFragment();

            filteredData.forEach(row => {
                const tr = document.createElement('tr');

                // Owner Name
                const td0 = document.createElement('td');
                td0.textContent = row.ownerName;
                tr.appendChild(td0);

                // Address
                const td1 = document.createElement('td');
                td1.textContent = row.address;
                tr.appendChild(td1);

                // Price
                const td2 = document.createElement('td');
                td2.textContent = row.price;
                tr.appendChild(td2);

                // Sold Date
                const td3 = document.createElement('td');
                if (row.soldDate && row.soldDate !== 'N/A') {
                    td3.innerHTML = `<span class="sold-badge">SOLD</span> ${row.soldDate}`;
                } else {
                    td3.textContent = 'N/A';
                }
                tr.appendChild(td3);

                // Agent Phone
                const td4 = document.createElement('td');
                td4.textContent = row.agentPhone || 'N/A';
                tr.appendChild(td4);

                fragment.appendChild(tr);
            });

            tbody.innerHTML = '';
            tbody.appendChild(fragment);
        }

        // ---- Export ----
        function exportToCSV() {
            if (filteredData.length === 0) { alert('No data to export'); return; }
            const countyLabel = activeCounty === 'all' ? 'all_counties' : activeCounty.toLowerCase();
            const headers = ['Owner Name', 'County', 'Address', 'Price', 'Sold Date', 'Agent Phone'];
            let csv = headers.join(',') + '\n';
            filteredData.forEach(row => {
                csv += [
                    `"${row.ownerName}"`, `"${row.county}"`, `"${row.address}"`,
                    `"${row.price}"`, `"${row.soldDate}"`, `"${row.agentPhone}"`
                ].join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `leads_${countyLabel}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // ---- Helpers ----
        function parseCSVRow(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') {
                    if (inQuotes && row[i + 1] === '"') { current += '"'; i++; }
                    else inQuotes = !inQuotes;
                } else if (ch === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            result.push(current.trim());
            return result;
        }

        function parsePrice(p) {
            if (!p || p === 'N/A') return 0;
            return parseFloat(p.replace(/[$,]/g, '')) || 0;
        }

        function parseDate(d) {
            if (!d || d === 'N/A') return new Date(0);
            return new Date(d);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
